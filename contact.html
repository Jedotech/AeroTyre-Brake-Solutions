<!DOCTYPE html>
<html>
<head>
<title>Request Quote | AeroTyre</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<nav><a href="index.html">← Back</a></nav>

<section class="section">
<h2>Request For Quote (RFQ)</h2>

<form action="https://formspree.io/f/mdalbdqq" method="POST">
<input type="text" name="company" placeholder="Company Name" required>
<input type="text" name="aircraft" placeholder="Aircraft Type" required>
<input type="text" name="partnumber" placeholder="Part Number" required>
<input type="number" name="quantity" placeholder="Quantity" required>
<select name="condition">
<option>New</option>
<option>Overhauled</option>
<option>Serviceable</option>
</select>
<input type="text" name="delivery" placeholder="Delivery Location" required>
<input type="date" name="required">
<select name="aog">
<option>No</option>
<option>Yes - AOG</option>
</select>
<input type="email" name="email" placeholder="Email Address" required>
<textarea name="notes" placeholder="Additional Notes"></textarea>
<button type="submit">Submit RFQ</button>
</form>

</section>
</body>
</html>
